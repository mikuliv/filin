services:
  target-web:
    image: nginx:1.27-alpine
    networks:
      - filin_lab_net
    expose:
      - "80"

  target-api:
    image: python:3.11-slim
    command: python -m http.server 8080
    working_dir: /srv
    networks:
      - filin_lab_net
      - filin_mgmt_net
    expose:
      - "8080"

  control-api:
    image: python:3.11-slim
    command: python -m http.server 8090
    working_dir: /srv
    networks:
      - filin_lab_net
    expose:
      - "8090"

  benign-client:
    image: python:3.11-slim
    command: python /workspace/lab/tools/benign_traffic_generator.py --dry-run --target target-web --duration 60 --rate-per-minute 5
    volumes:
      - ../..:/workspace:ro
    networks:
      - filin_lab_net
    depends_on:
      - target-web
      - target-api

  attacker-simulator:
    image: python:3.11-slim
    command: python /workspace/lab/tools/scenario_runner.py --scenario /workspace/lab/scenarios/attacks/port_scan.yaml --manifest /workspace/lab/output/scenario_manifest.yaml --dry-run
    volumes:
      - ../..:/workspace:ro
      - ../output:/workspace/lab/output
    networks:
      - filin_lab_net
    depends_on:
      - target-web
      - target-api
      - control-api

  scenario-runner:
    image: python:3.11-slim
    command: python /workspace/lab/tools/scenario_runner.py --scenario /workspace/lab/scenarios/benign/web_browsing.yaml --manifest /workspace/lab/output/scenario_manifest.yaml --dry-run
    volumes:
      - ../..:/workspace:ro
      - ../output:/workspace/lab/output
    networks:
      - filin_lab_net
      - filin_mgmt_net
    depends_on:
      - target-web
      - target-api

  zeek:
    image: zeek/zeek:latest
    command: zeek --version
    networks:
      - filin_lab_net
      - filin_monitor_net

  suricata:
    image: jasonish/suricata:latest
    command: suricata --build-info
    networks:
      - filin_lab_net
      - filin_monitor_net

  filebeat:
    image: elastic/filebeat:8.15.0
    command: filebeat version
    networks:
      - filin_monitor_net
    depends_on:
      - elasticsearch

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - filin_monitor_net
      - filin_mgmt_net
    expose:
      - "9200"

  kibana:
    image: kibana:8.15.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${FILIN_KIBANA_PORT:-5601}:5601"
    networks:
      - filin_mgmt_net
    depends_on:
      - elasticsearch

  filin-backend:
    build:
      context: ../../backend
    ports:
      - "${FILIN_BACKEND_PORT:-8000}:8000"
    networks:
      - filin_mgmt_net
      - filin_monitor_net

networks:
  filin_lab_net:
    name: ${FILIN_LAB_NET:-filin_lab_net}
  filin_monitor_net:
    name: ${FILIN_MONITOR_NET:-filin_monitor_net}
  filin_mgmt_net:
    name: ${FILIN_MGMT_NET:-filin_mgmt_net}
