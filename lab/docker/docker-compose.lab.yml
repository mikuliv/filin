services:
  target-web:
    build:
      context: ./services/target-web
    ports:
      - "${FILIN_TARGET_WEB_PORT:-127.0.0.1:18080}:80"
    volumes:
      - ../output/target-web:/var/log/nginx
    networks:
      - filin_lab_net
      - filin_mgmt_net
    expose:
      - "80"
    security_opt:
      - no-new-privileges:true

  target-api:
    build:
      context: ./services/target-api
    ports:
      - "${FILIN_TARGET_API_PORT:-127.0.0.1:18081}:8080"
    networks:
      - filin_lab_net
      - filin_mgmt_net
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true

  control-api:
    build:
      context: ./services/control-api
    networks:
      - filin_lab_net
    expose:
      - "8090"
    security_opt:
      - no-new-privileges:true

  target-ssh-sim:
    build:
      context: ./services/target-ssh-sim
    networks:
      - filin_lab_net
    expose:
      - "2222"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  traffic-client:
    image: filin-traffic-client:0.1
    build:
      context: ./services/traffic-client
    command: python -c "import time; time.sleep(86400)"
    volumes:
      - ../..:/workspace:ro
    networks:
      - filin_lab_net
    depends_on:
      - target-web
      - target-api
      - control-api
      - target-ssh-sim
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  sensor-capture:
    build:
      context: .
      dockerfile: Dockerfile.sensor-capture
    network_mode: "service:traffic-client"
    command: ["-i", "any", "-U", "-w", "/capture/capture.pcap", "not", "port", "53"]
    volumes:
      - filin_sensor_capture:/capture
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

  benign-client:
    image: filin-traffic-client:0.1
    command: python client.py --action web_browsing --target target-web --duration 60 --rate-per-minute 5
    volumes:
      - ../..:/workspace:ro
    networks:
      - filin_lab_net
    depends_on:
      - target-web
      - target-api
    profiles: ["manual"]

  attacker-simulator:
    image: filin-traffic-client:0.1
    command: python client.py --action port_scan --target target-web --duration 60 --rate-per-minute 5
    volumes:
      - ../..:/workspace:ro
      - ../output:/workspace/lab/output
    networks:
      - filin_lab_net
    depends_on:
      - target-web
      - target-api
      - control-api
    profiles: ["manual"]

  scenario-runner:
    image: filin-traffic-client:0.1
    command: python /workspace/lab/tools/scenario_runner.py --scenario /workspace/lab/scenarios/benign/web_browsing.yaml --manifest /workspace/lab/output/scenario_manifest.yaml --dry-run
    volumes:
      - ../..:/workspace:ro
      - ../output:/workspace/lab/output
    networks:
      - filin_lab_net
      - filin_mgmt_net
    depends_on:
      - target-web
      - target-api
    profiles: ["manual"]

  zeek:
    image: zeek/zeek:latest
    command: zeek --version
    networks:
      - filin_lab_net
      - filin_monitor_net

  suricata:
    image: jasonish/suricata:latest
    command: suricata --build-info
    networks:
      - filin_lab_net
      - filin_monitor_net

  filebeat:
    image: elastic/filebeat:8.15.0
    command: filebeat version
    networks:
      - filin_monitor_net
    depends_on:
      - elasticsearch

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - filin_monitor_net
      - filin_mgmt_net
    expose:
      - "9200"

  kibana:
    image: kibana:8.15.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${FILIN_KIBANA_PORT:-5601}:5601"
    networks:
      - filin_mgmt_net
    depends_on:
      - elasticsearch

  filin-backend:
    build:
      context: ../../backend
    ports:
      - "${FILIN_BACKEND_PORT:-8000}:8000"
    networks:
      - filin_mgmt_net
      - filin_monitor_net

networks:
  filin_lab_net:
    name: ${FILIN_LAB_NET:-filin_lab_net}
    internal: true
  filin_monitor_net:
    name: ${FILIN_MONITOR_NET:-filin_monitor_net}
  filin_mgmt_net:
    name: ${FILIN_MGMT_NET:-filin_mgmt_net}
volumes:
  filin_sensor_capture:
    name: ${FILIN_SENSOR_CAPTURE_VOLUME:-filin_sensor_capture}
