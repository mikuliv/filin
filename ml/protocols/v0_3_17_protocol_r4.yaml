revision_reason: >-
  Revision 3 завершила все 5 400 фактических секунд первого endurance run и
  закрыла 5 400 capture-сегментов, но не смогла опустошить transport backlog
  за замороженные 600 секунд. Source создал 41 340 canonical events, а durable
  connector и receiver сохранили по 24 420. Sensor→connector уже использовал
  постоянное TLS-соединение. Диагностика показала, что connector→receiver
  продолжал создавать новое TLS-соединение на каждый live batch; при росте
  журнала и конкуренции trace/checkpoint операций медианная доставка batch
  выросла с 134,4 ms в первые десять минут до 5 102,3 ms в интервале
  80–90 минут. Кампания сохранена и не используется как evidence. Revision 4
  переводит вторую mTLS-границу на постоянные последовательные соединения
  каждого frozen delivery worker. Candidate, features, contracts, schedules,
  durations, faults, gates и readiness не меняются.
