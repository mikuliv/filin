revision_reason: >-
  Revision 5 успешно завершила первый независимый endurance run:
  5 400,000 фактических секунд, 5 400 capture-сегментов, 41 400 окон и
  41 340 canonical events без потерь, повторов или накопительного backlog.
  До первого capture второго run обнаружено, что compose повторно подключил
  общий каталог volumes и новый receiver уже содержал 41 340 событий run A.
  Это нарушает frozen campaign independence и cross-run contamination gate.
  Кампания остановлена до первого события run B, сохранена и не используется
  как evidence. Revision 6 изменяет только bind-маршрутизацию: каждый run
  получает собственный каталог sensor/connector/receiver volumes. Candidate,
  features, transport/storage/event contracts, schedules, durations, faults,
  gates и readiness не меняются.
