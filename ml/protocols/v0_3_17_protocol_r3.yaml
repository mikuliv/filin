revision_reason: >-
  Во время фактического endurance-прогона revision 2 вычислительный контур не
  отставал, однако sensor-runtime создавал новое TLS-соединение для каждого
  небольшого ingress batch. На 1 813-м закрытом capture-окне source содержал
  13 450 canonical events, а durable connector и receiver — по 12 710 событий.
  Устойчивый транспортный хвост 740 событий означал пропуск замороженного
  nominal throughput gate. Кампания остановлена и сохранена без переписывания.
  Revision 3 меняет только жизненный цикл TLS-соединения: один mTLS/TLS 1.3
  канал повторно используется для последовательных batch и пересоздаётся после
  ошибки. Candidate, features, contracts, schedules, durations, faults, gates
  и readiness остаются неизменными.
