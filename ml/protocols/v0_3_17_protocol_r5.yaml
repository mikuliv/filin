revision_reason: >-
  До официального старта campaign revision 4 постоянные TLS-соединения обеих
  границ проверялись на отдельном live smoke. Первые 20 минут завершились
  12 000/12 000 после 30 секунд drain, однако при продолжении без перезапуска
  базы durable journal достиг 14 000 из 15 000 source events и накопил хвост.
  Диагностика query plan выявила периодический полный scan и sort запроса
  durable pending pump по неиндексированным delivery_status и
  journal_durable_ns. Observability trace при этом находился в том же WAL,
  что и contractual durable rows. Smoke сохранён и не используется как
  evidence. Revision 5 добавляет только индекс доступа pending pump и выносит
  санитарный trace в отдельные локальные SQLite WAL-файлы. Основные journal,
  checkpoint, receiver commit, ACK, request/batch/event и storage contracts
  не меняются. Candidate, features, schedules, durations, faults, gates и
  readiness остаются неизменными.
