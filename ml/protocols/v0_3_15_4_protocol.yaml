split_policy:
  unit: whole_session_id
  training_session_suffixes: ["001", "002", "003"]
  calibration_session_suffix: "004"
  internal_audit_session_suffix: "005"
  counts: {training: 15, calibration: 5, internal_audit: 5}
  freeze_before_capture: true
  audit_labels_locked_until_candidate_freeze: true
  related_episode_windows_must_not_split: true
  benign_variant_exact_copy_across_audit_forbidden: true
baseline_variants:
  A: frozen v0.3.11 weights and historical v1 preprocessing
  B: frozen v0.3.11 weights and corrected v2 preprocessing as a new compatibility candidate
  C: corrected scenarios and historical-compatible feature path
  D: corrected scenarios and feature v2
training_decision_gate:
  set_true_if_any:
    - v2 required and frozen weights fail compatibility gates
    - corrected scenario and feature path retains subtype failures
    - auth_failures recall below 0.90
    - attack macro recall below 0.95
    - attack macro F1 below 0.95
    - corrected conformal requires a new candidate-linked calibration distribution
    - historical composite candidate is incompatible with v2 semantics
  set_false_only_if_all:
    scenario_defects_fixed: true
    v2_compatible_or_not_promoted: true
    baseline_gates_passed: true
    auth_failures_recall_min: 0.90
    attack_macro_recall_min: 0.95
    attack_macro_f1_min: 0.95
    fpr_max: 0.02
    attack_episode_recall_min: 0.95
    detection_by_second_min: 0.95
    conformal_empty_set_degradation_absent: true
    composite_versionable_without_training: true
candidate_search_space:
  frozen_before_fit: true
  model_family: HistGradientBoostingClassifier
  maximum_configurations: 3
  candidates:
    A: {learning_rate: 0.08, max_iter: 120, max_leaf_nodes: 15, min_samples_leaf: 10, l2_regularization: 0.0, auth_sample_weight: 1.0, random_state: 3154}
    B: {learning_rate: 0.08, max_iter: 120, max_leaf_nodes: 15, min_samples_leaf: 10, l2_regularization: 0.0, auth_sample_weight: 2.0, random_state: 3154}
    C: {learning_rate: 0.05, max_iter: 160, max_leaf_nodes: 7, min_samples_leaf: 20, l2_regularization: 1.0, auth_sample_weight: 1.5, random_state: 3154}
  neural_networks: forbidden
  automl: forbidden
  external_training_api: forbidden
grouped_validation:
