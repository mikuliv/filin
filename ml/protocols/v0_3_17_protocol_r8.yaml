revision_reason: >-
  Revision 7 успешно завершила независимый endurance run за 5 400,000 фактических
  секунд с 41 340 canonical events без потерь. Во втором run первая ротация
  сертификата прошла, но вторая оставила reference receiver остановленным с
  exit code 137 и была записана как failed. Одновременно Windows bind-mounted
  SQLite FULL durability не обеспечила drain frozen transition workload:
  при остановке source/connector/receiver содержали 74 320/43 271/38 271 событий.
  Кампания сохранена и исключена из evidence. Revision 8 заменяет только
  физический носитель per-run durable storage на отдельные локальные Docker
  named volumes, сохраняет offline snapshots в run evidence root, выполняет
  атомарную замену synthetic certificate files и гарантированный stop/up с
  health verification. Candidate, features, schemas, durability, schedules,
  durations, faults, gates и readiness не меняются.
