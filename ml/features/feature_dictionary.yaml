schema_version: 1
profile: network_sensor_v0_6_integrity
semantics_change: future_only
historical_profiles_immutable: true
ordered_features:
  - flow_count
  - tcp_flow_count
  - udp_flow_count
  - failed_connection_count
  - total_bytes
  - total_packets
  - http_request_count
  - dns_query_count
  - connection_failure_rate
  - http_error_rate
  - dns_error_rate
  - orig_bytes_share
  - orig_packets_share
  - events_per_second
  - flows_per_second
  - bytes_per_second
  - packets_per_second
  - failed_connections_per_second
  - unique_destinations_per_flow
  - unique_services_per_flow
defaults: &defaults
  source: агрегация Zeek-событий, сопоставленных по маркерам
  missing: отклонить execution
  empty_window: счётчики равны нулю; execution с неопределёнными измерениями отклоняется
features:
  flow_count: {<<: *defaults, description: Число сопоставленных потоков соединений, unit: потоки, valid_range: "[0, +inf)"}
  tcp_flow_count: {<<: *defaults, description: Число TCP-потоков, unit: потоки, valid_range: "[0, +inf)"}
  udp_flow_count: {<<: *defaults, description: Число UDP-потоков, unit: потоки, valid_range: "[0, +inf)"}
  failed_connection_count: {<<: *defaults, description: Число соединений без успешного завершения, unit: соединения, valid_range: "[0, +inf)"}
  total_bytes: {<<: *defaults, description: Наблюдаемые байты инициатора и ответчика, unit: байты, valid_range: "[0, +inf)"}
  total_packets: {<<: *defaults, description: Наблюдаемые пакеты инициатора и ответчика, unit: пакеты, valid_range: "[0, +inf)"}
  http_request_count: {<<: *defaults, description: Число наблюдаемых HTTP-запросов, unit: запросы, valid_range: "[0, +inf)"}
  dns_query_count: {<<: *defaults, description: Число наблюдаемых DNS-запросов, unit: запросы, valid_range: "[0, +inf)"}
  connection_failure_rate: {<<: *defaults, description: Доля неуспешных потоков, unit: доля, valid_range: "[0, 1]"}
  http_error_rate: {<<: *defaults, description: Доля HTTP-запросов с ошибкой, unit: доля, valid_range: "[0, 1]"}
  dns_error_rate: {<<: *defaults, description: Доля DNS-запросов с ошибкой, unit: доля, valid_range: "[0, 1]"}
  orig_bytes_share: {<<: *defaults, description: Доля байтов инициатора в общем числе байтов, unit: доля, valid_range: "[0, 1]"}
  orig_packets_share: {<<: *defaults, description: Доля пакетов инициатора в общем числе пакетов, unit: доля, valid_range: "[0, 1]"}
  events_per_second: {<<: *defaults, description: Сопоставленные события за секунду marker interval, unit: события/секунда, valid_range: "[0, +inf)"}
  flows_per_second: {<<: *defaults, description: Потоки за секунду marker interval, unit: потоки/секунда, valid_range: "[0, +inf)"}
  bytes_per_second: {<<: *defaults, description: Байты за секунду marker interval, unit: байты/секунда, valid_range: "[0, +inf)"}
  packets_per_second: {<<: *defaults, description: Пакеты за секунду marker interval, unit: пакеты/секунда, valid_range: "[0, +inf)"}
  failed_connections_per_second: {<<: *defaults, description: Неуспешные соединения за секунду marker interval, unit: соединения/секунда, valid_range: "[0, +inf)"}
  unique_destinations_per_flow: {<<: *defaults, description: Число уникальных назначений относительно числа потоков, unit: отношение, valid_range: "[0, +inf)"}
  unique_services_per_flow: {<<: *defaults, description: Число уникальных сервисов относительно числа потоков, unit: отношение, valid_range: "[0, +inf)"}
