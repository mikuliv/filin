version: "0.1"
description: "Каталог признаков лабораторного датасета Филин v0.1. Поля разметки и времени сценариев хранятся только как metadata и не используются как входные признаки модели."
metadata_only:
  - scenario_id
  - run_sequence
  - planned_started_at
  - planned_finished_at
  - actual_started_at
  - actual_finished_at
  - label
  - label_type
  - mitre_technique_id
features:
  - name: duration_seconds
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Длительность окна наблюдения или агрегированной группы событий в секундах."
    used_for: [all]
    leakage_risk: low
  - name: protocol_id
    type: numeric
    level: window
    source: [normalized_events]
    description: "Числовой идентификатор доминирующего протокола в окне."
    used_for: [traffic_profile]
    leakage_risk: low
  - name: dst_port
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Минимальный наблюдаемый порт назначения в окне; в следующих версиях будет заменен более точным распределением портов."
    used_for: [port_scan, service_profile]
    leakage_risk: low
  - name: total_connections
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Общее число сетевых действий, близких к соединениям или запросам."
    used_for: [all]
    leakage_risk: low
  - name: total_packets
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Оценка количества событий пакетов в учебном окне v0.1."
    used_for: [burst, low_rate_dos]
    leakage_risk: low
  - name: total_bytes
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Сумма входящих и исходящих байтов по событиям окна."
    used_for: [file_downloads, low_rate_dos]
    leakage_risk: low
  - name: bytes_in
    type: numeric
    level: window
    source: [normalized_events]
    description: "Суммарный входящий объем данных."
    used_for: [file_downloads, traffic_volume]
    leakage_risk: low
  - name: bytes_out
    type: numeric
    level: window
    source: [normalized_events]
    description: "Суммарный исходящий объем данных."
    used_for: [traffic_volume]
    leakage_risk: low
  - name: packets_in
    type: numeric
    level: window
    source: [normalized_events]
    description: "Оценка количества входящих пакетных событий."
    used_for: [traffic_volume]
    leakage_risk: low
  - name: packets_out
    type: numeric
    level: window
    source: [normalized_events]
    description: "Оценка количества исходящих пакетных событий."
    used_for: [traffic_volume]
    leakage_risk: low
  - name: bytes_per_second
    type: numeric
    level: window
    source: [normalized_events]
    description: "Средний объем байтов в секунду."
    used_for: [low_rate_dos, burst]
    leakage_risk: low
  - name: packets_per_second
    type: numeric
    level: window
    source: [normalized_events]
    description: "Средняя частота событий в секунду."
    used_for: [low_rate_dos, burst]
    leakage_risk: low
  - name: avg_packet_size
    type: numeric
    level: window
    source: [normalized_events]
    description: "Средний размер события по байтам."
    used_for: [traffic_profile]
    leakage_risk: low
  - name: unique_dst_ports
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Количество уникальных портов назначения в окне наблюдения."
    used_for: [port_scan]
    leakage_risk: low
  - name: unique_dst_ips
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Количество уникальных внутренних целей в окне."
    used_for: [port_scan, lateral_activity]
    leakage_risk: low
  - name: short_connection_count
    type: numeric
    level: window
    source: [normalized_events]
    description: "Количество коротких соединений или запросов."
    used_for: [port_scan, web_probe]
    leakage_risk: low
  - name: short_connection_ratio
    type: numeric
    level: window
    source: [normalized_events]
    description: "Доля коротких соединений или запросов."
    used_for: [port_scan, web_probe]
    leakage_risk: low
  - name: failed_connection_count
    type: numeric
    level: window
    source: [normalized_events]
    description: "Количество неуспешных соединений, ошибок или отказов."
    used_for: [port_scan, web_probe, auth_failures]
    leakage_risk: low
  - name: failed_connection_ratio
    type: numeric
    level: window
    source: [normalized_events]
    description: "Доля неуспешных соединений, ошибок или отказов."
    used_for: [port_scan, web_probe, auth_failures]
    leakage_risk: low
  - name: tcp_syn_count
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Учебная оценка числа TCP connect-проверок."
    used_for: [port_scan]
    leakage_risk: low
  - name: tcp_ack_count
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Учебная оценка числа успешных TCP connect-проверок."
    used_for: [port_scan]
    leakage_risk: low
  - name: tcp_rst_count
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Учебная оценка числа закрытых TCP connect-проверок."
    used_for: [port_scan]
    leakage_risk: low
  - name: tcp_fin_count
    type: numeric
    level: window
    source: [normalized_events, zeek_conn]
    description: "Учебная оценка числа завершенных TCP connect-проверок."
    used_for: [port_scan]
    leakage_risk: low
  - name: syn_rate
    type: numeric
    level: window
    source: [normalized_events]
    description: "Частота TCP connect-проверок в секунду."
    used_for: [port_scan]
    leakage_risk: low
  - name: rst_rate
    type: numeric
    level: window
    source: [normalized_events]
    description: "Частота закрытых TCP connect-проверок в секунду."
    used_for: [port_scan]
    leakage_risk: low
  - name: http_request_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество HTTP-запросов в окне."
    used_for: [web_probe, low_rate_dos, benign_web]
    leakage_risk: low
  - name: http_get_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество HTTP GET-запросов."
    used_for: [web_probe, benign_web]
    leakage_risk: low
  - name: http_post_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество HTTP POST-запросов."
    used_for: [auth_failures, beacon_simulation]
    leakage_risk: low
  - name: http_2xx_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество успешных HTTP-ответов."
    used_for: [benign_web]
    leakage_risk: low
  - name: http_4xx_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество HTTP-ответов класса 4xx."
    used_for: [web_probe, auth_failures]
    leakage_risk: low
  - name: http_5xx_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество HTTP-ответов класса 5xx."
    used_for: [service_errors]
    leakage_risk: low
  - name: http_4xx_rate
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Доля HTTP-ответов класса 4xx."
    used_for: [web_probe, auth_failures]
    leakage_risk: low
  - name: unique_url_count
    type: numeric
    level: window
    source: [normalized_events, zeek_http]
    description: "Количество уникальных URL-путей."
    used_for: [web_probe, benign_web]
    leakage_risk: low
  - name: suspicious_path_count
    type: numeric
    level: window
    source: [normalized_events]
    description: "Количество обращений к безопасным тестовым путям probe-сценария."
    used_for: [web_probe]
    leakage_risk: low
  - name: file_download_count
    type: numeric
    level: window
    source: [normalized_events]
    description: "Количество загрузок заранее подготовленных небольших файлов."
    used_for: [file_downloads]
    leakage_risk: low
  - name: dns_query_count
    type: numeric
    level: window
    source: [normalized_events, zeek_dns]
    description: "Количество DNS-like запросов к внутренним именам стенда."
    used_for: [dns_activity]
    leakage_risk: low
  - name: unique_dns_names
    type: numeric
    level: window
    source: [normalized_events, zeek_dns]
    description: "Количество уникальных внутренних DNS-имен."
    used_for: [dns_activity]
    leakage_risk: low
  - name: dns_nxdomain_count
    type: numeric
    level: window
    source: [normalized_events, zeek_dns]
    description: "Количество DNS-like ответов без найденного имени."
    used_for: [dns_activity]
    leakage_risk: low
  - name: login_attempt_count
    type: numeric
    level: window
    source: [normalized_events]
    description: "Количество учебных попыток входа."
    used_for: [auth_failures]
    leakage_risk: low
  - name: failed_login_count
    type: numeric
    level: window
    source: [normalized_events]
    description: "Количество неуспешных учебных попыток входа."
    used_for: [auth_failures]
    leakage_risk: low
  - name: failed_login_rate
    type: numeric
    level: window
    source: [normalized_events]
    description: "Доля неуспешных учебных попыток входа."
    used_for: [auth_failures]
    leakage_risk: low
  - name: mean_interarrival_time
    type: numeric
    level: window
    source: [normalized_events]
    description: "Средний интервал между событиями в окне."
    used_for: [beacon_simulation, burst]
    leakage_risk: low
  - name: std_interarrival_time
    type: numeric
    level: window
    source: [normalized_events]
    description: "Стандартное отклонение интервалов между событиями."
    used_for: [beacon_simulation]
    leakage_risk: low
  - name: periodicity_score
    type: numeric
    level: window
    source: [normalized_events]
    description: "Учебная оценка регулярности событий."
    used_for: [beacon_simulation]
    leakage_risk: low
  - name: burst_score
    type: numeric
    level: window
    source: [normalized_events]
    description: "Учебная оценка плотности событий в коротком интервале."
    used_for: [low_rate_dos, burst]
    leakage_risk: low
