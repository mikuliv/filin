experiment_id: filin-v0.2.4-independent-baselines
campaign_id: filin-v0.2.3-independent-executions
random_state: 42
feature_profiles: [client_core_v0_2, client_extended_v0_2]
target: label
group_column: run_id
model_selection:
  method: leave_one_train_run_out
  primary_metric: macro_f1
  tie_break_metrics: [attack_macro_recall, balanced_accuracy, macro_f1_std, model_complexity]
external_evaluation: {per_test_run: true, pooled_test: true, macro_average_across_runs: true}
models: [DummyClassifier, LogisticRegression, RandomForestClassifier, HistGradientBoostingClassifier]
