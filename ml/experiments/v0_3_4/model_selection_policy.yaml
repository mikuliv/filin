model_selection_policy:
  status: frozen_before_validation
  feature_profiles: [network_sensor_v0_3_control, network_sensor_v0_4_rates, network_sensor_v0_4_hybrid]
  cross_validation: {type: StratifiedGroupKFold, group: run_id, n_splits: 6, shuffle: true, random_state: 42}
  minimum_cv_metrics: {macro_f1: 0.78, benign_recall: 0.88, hard_negative_benign_recall: 0.78, attack_macro_recall: 0.82, collapsed_attack_precision: 0.78, collapsed_attack_recall: 0.82, worst_fold_benign_recall: 0.70, worst_fold_attack_macro_recall: 0.60}
  maximum_cv_metrics: {false_positive_rate: 0.12, macro_f1_std: 0.15}
  internal_validation_policy: {minimum_macro_f1: 0.75, minimum_balanced_accuracy: 0.80, minimum_benign_recall: 0.85, maximum_false_positive_rate: 0.15, minimum_hard_negative_benign_recall: 0.75, minimum_attack_macro_recall: 0.80, minimum_collapsed_attack_precision: 0.75, minimum_collapsed_attack_recall: 0.80, prohibit_zero_recall_class: true}
  candidates:
    logistic_regression: {class: LogisticRegression, grid: {C: [0.1, 1.0, 10.0]}, parameters: {max_iter: 2000, class_weight: balanced, random_state: 42}, preprocessing: [SimpleImputer_median, StandardScaler]}
    random_forest: {class: RandomForestClassifier, grid: {max_depth: [6, 12, null], min_samples_leaf: [2, 4]}, parameters: {n_estimators: 300, class_weight: balanced_subsample, random_state: 42, n_jobs: -1}, preprocessing: [SimpleImputer_median]}
    hist_gradient_boosting: {class: HistGradientBoostingClassifier, grid: {learning_rate: [0.05, 0.1], max_leaf_nodes: [15, 31], l2_regularization: [0.0, 1.0]}, parameters: {max_iter: 200, random_state: 42}, preprocessing: [SimpleImputer_median]}
  matrix:
    network_sensor_v0_3_control: [logistic_regression, random_forest]
    network_sensor_v0_4_rates: [logistic_regression, random_forest, hist_gradient_boosting]
    network_sensor_v0_4_hybrid: [logistic_regression, random_forest, hist_gradient_boosting]
  prohibit_validation_fit: true
  prohibit_v033_input: true
