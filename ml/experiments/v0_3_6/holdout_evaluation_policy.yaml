evaluation_policy:
  minimum_macro_f1: 0.80
  minimum_balanced_accuracy: 0.90
  minimum_benign_recall: 0.85
  maximum_false_positive_rate: 0.15
  minimum_hard_negative_benign_recall: 0.75
  minimum_attack_macro_recall: 0.90
  minimum_collapsed_attack_precision: 0.75
  minimum_collapsed_attack_recall: 0.90
  prohibit_zero_recall_class: true
group_policy: {minimum_macro_f1: 0.65, minimum_benign_recall: 0.70, maximum_false_positive_rate: 0.30, minimum_attack_macro_recall: 0.80}
variant_policy: {minimum_benign_recall: 0.50}
integrity_policy: {require_protocol_freeze: true, require_holdout_lock: true, require_no_fit: true, require_prediction_once: true, require_overlap_zero: true}
