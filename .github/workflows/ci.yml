name: ci
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m pip install -r backend/requirements.txt -r ml/requirements.txt
      - run: python tools/docs/validate_documentation.py --strict
      - run: python tools/check_release_images.py --compose lab/docker/docker-compose.lab.yml --release
      - run: python tools/audit/check_repository_artifacts.py
      - run: python -m compileall tools ml collectors backend lab
      - run: python -m unittest discover -s ml/tests -p "test_*.py"
      - run: python -m pytest collectors/shadow/tests -q
      - run: python -m pytest collectors/shadow_trial/tests -q
      - run: python -m pytest ml/tests/test_v03152_prospective_trial.py -q
      - run: python -m pytest ml/tests/test_v03153_regression_analysis.py -q
      - run: python -m pytest ml/tests/test_v03154_controlled_redevelopment.py -q
      - run: python -m pytest ml/tests/test_v03155_independent_holdout.py -q
      - run: python -m pytest ml/tests/test_v031551_runtime_recovery.py -q
      - run: python -m pytest ml/tests/test_v0316_staging_transport.py -q
      - run: python -m unittest discover -s backend/tests -p "test_*.py"
      - run: python tools/docs/validate_project_status.py --strict
      - run: python tools/audit/validate_v03151_bundle.py --manifest ml/reports/v0_3_15_1/v0_3_15_1_bundle_manifest.yaml --detached ml/reports/v0_3_15_1/v0_3_15_1_bundle_manifest.sha256 --root .
      - run: python tools/audit/validate_v03152_bundle.py --manifest ml/reports/v0_3_15_2/v0_3_15_2_bundle_manifest.yaml --detached ml/reports/v0_3_15_2/v0_3_15_2_bundle_manifest.sha256 --root .
      - run: python tools/audit/validate_v03153_bundle.py --manifest ml/reports/v0_3_15_3/v0_3_15_3_bundle_manifest.yaml --detached ml/reports/v0_3_15_3/v0_3_15_3_bundle_manifest.sha256 --root .
      - run: python tools/audit/validate_v03153_artifacts.py
      - run: python tools/audit/validate_v03154_artifacts.py
      - run: python tools/audit/validate_v03154_bundle.py --manifest ml/reports/v0_3_15_4/v0_3_15_4_bundle_manifest.yaml --detached ml/reports/v0_3_15_4/v0_3_15_4_bundle_manifest.sha256 --root .
      - run: python tools/audit/validate_v03155_artifacts.py
      - run: python tools/audit/validate_v03155_bundle.py --manifest ml/reports/v0_3_15_5/v0_3_15_5_bundle_manifest.yaml --detached ml/reports/v0_3_15_5/v0_3_15_5_bundle_manifest.sha256 --root .
      - run: python tools/docs/validate_v031551_summary.py --strict
      - run: python tools/audit/validate_v031551_bundle.py --manifest ml/reports/v0_3_15_5_1/v0_3_15_5_1_bundle_manifest.yaml --detached ml/reports/v0_3_15_5_1/v0_3_15_5_1_bundle_manifest.sha256 --root .
      - run: python tools/audit/validate_v0316_bundle.py --manifest ml/reports/v0_3_16/v0_3_16_bundle_manifest.yaml --detached ml/reports/v0_3_16/v0_3_16_bundle_manifest.sha256 --root .
      - run: git diff --check
