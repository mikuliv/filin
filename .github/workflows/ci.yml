name: ci
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m pip install -r backend/requirements.txt -r ml/requirements.txt
      - run: python tools/docs/validate_documentation.py --strict
      - run: python tools/check_release_images.py --compose lab/docker/docker-compose.lab.yml --release
      - run: python tools/audit/check_repository_artifacts.py
      - run: python -m compileall tools ml backend lab
      - run: python -m unittest discover -s ml/tests -p "test_*.py"
      - run: python -m unittest discover -s backend/tests -p "test_*.py"
      - run: git diff --check
